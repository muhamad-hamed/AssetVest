services:
  postgres:
    image: postgres:17-alpine
    container_name: assetvest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: AssetVestDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - assetvest-network

  seq:
    image: datalust/seq:latest
    container_name: assetvest-seq
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: M#seq@2026  # Change in production
    ports:
      - "5341:80"
    volumes:
      - seq_data:/data
    networks:
      - assetvest-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assetvest-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=AssetVestDb;Username=postgres;Password=postgres;Include Error Detail=true;Timeout=30"
      Seq__Url: "http://seq:80"
      Jwt__SecretKey: "DEVELOPMENT-SECRET-KEY-MIN-32-CHARS-CHANGE-IN-PRODUCTION-12345"
      Jwt__Issuer: "AssetVest.Api"
      Jwt__Audience: "AssetVest.Client"
      Jwt__AccessTokenExpirationMinutes: "15"
      Jwt__RefreshTokenExpirationDays: "7"
    ports:
      - "5062:8080"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - assetvest-network
    restart: unless-stopped

networks:
  assetvest-network:
    driver: bridge

volumes:
  postgres_data:
  seq_data:
